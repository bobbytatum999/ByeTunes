name: Build unsigned ByeTunes IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  release:
    types:
      - published

concurrency:
  group: unsigned-ios-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  PROJECT_FILE: MusicManager.xcodeproj
  SCHEME: MusicManager
  APP_DIR: MusicManager
  CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
  CI: true

jobs:
  build-unsigned-ipa:
    name: Build unsigned device IPA
    runs-on: macos-latest
    timeout-minutes: 45

    permissions:
      contents: write
      actions: read

    outputs:
      build-status: ${{ steps.build.outcome }}
      ipa-size: ${{ steps.package.outputs.ipa-size }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean stale generated files
        shell: bash
        run: |
          rm -f "$APP_DIR"/*.o
          rm -f "$APP_DIR"/Bridging-Header.h
          rm -f "$APP_DIR"/idevice.h
          rm -f "$APP_DIR"/libidevice_ffi.a
          # Restore tracked Bridging-Header.h if it exists in repo
          git checkout -- "$APP_DIR"/Bridging-Header.h 2>/dev/null || true

      - name: Select Xcode
        id: setup-xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify environment
        shell: bash
        run: |
          echo "=== Runner Environment ==="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch:  $(uname -m)"
          echo "Xcode: $(xcodebuild -version | head -1)"
          xcodebuild -showsdks | grep -E 'iphoneos|iOS' || true

      - name: Install Rust iOS target
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Build idevice-ffi static library
        id: build-idevice
        shell: bash
        run: |
          set -euo pipefail

          DEST_DIR="$GITHUB_WORKSPACE/$APP_DIR"

          # Check if artifacts already exist (cached by rust-cache or previous step)
          if [[ -f "$DEST_DIR/idevice.h" && -f "$DEST_DIR/libidevice_ffi.a" ]]; then
            echo "Using existing idevice artifacts"
            ls -la "$DEST_DIR"/idevice.h "$DEST_DIR"/libidevice_ffi.a
          else
            echo "Building idevice-ffi from source..."
            WORK_DIR="$RUNNER_TEMP/idevice"
            rm -rf "$WORK_DIR"
            mkdir -p "$WORK_DIR"

            # Clone with retry logic
            for attempt in 1 2 3; do
              echo "Clone attempt $attempt..."
              if git clone --depth 1 https://github.com/jkcoxson/idevice "$WORK_DIR"; then
                break
              fi
              echo "Clone failed, waiting 5s..."
              sleep 5
              rm -rf "$WORK_DIR"
              mkdir -p "$WORK_DIR"
            done

            cd "$WORK_DIR"
            export IPHONEOS_DEPLOYMENT_TARGET=16.0

            cargo build --release --package idevice-ffi --target aarch64-apple-ios 2>&1 | tail -40

            HEADER_PATH="$(find . -name 'idevice.h' -type f | head -n 1)"
            LIB_PATH="$(find target -path '*aarch64-apple-ios/release/libidevice_ffi.a' -type f | head -n 1)"

            if [[ -z "$HEADER_PATH" || -z "$LIB_PATH" ]]; then
              echo "ERROR: idevice build artifacts not found"
              find target -name "*.a" -type f 2>/dev/null || true
              find . -name "*.h" -type f 2>/dev/null || true
              exit 1
            fi

            cp -v "$HEADER_PATH" "$DEST_DIR/idevice.h"
            cp -v "$LIB_PATH" "$DEST_DIR/libidevice_ffi.a"

            echo "idevice-ffi built successfully"
            ls -la "$DEST_DIR"/libidevice_ffi.a "$DEST_DIR"/idevice.h
          fi

          # Generate bridging header (avoid heredoc to prevent YAML block-scalar issues)
          printf '%s\n' '#import "idevice.h"' > "$GITHUB_WORKSPACE/$APP_DIR/Bridging-Header.h"

          echo "Bridging-Header.h contents:"
          cat "$GITHUB_WORKSPACE/$APP_DIR/Bridging-Header.h"

      - name: Verify project integrity
        id: verify-project
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Available Schemes ==="
          xcodebuild -project "$PROJECT_FILE" -list

          echo ""
          echo "=== Source File Counts ==="
          echo "Swift files: $(find "$APP_DIR" -name '*.swift' | wc -l)"
          echo "Headers:     $(find "$APP_DIR" -name '*.h' | wc -l)"
          echo "Libraries:   $(find "$APP_DIR" -name '*.a' | wc -l)"

          # Detect merge conflict markers
          if grep -rl '<<<<<<<' "$APP_DIR"/*.swift 2>/dev/null | grep -q .; then
            echo "ERROR: Merge conflict markers found in Swift files"
            grep -rl '<<<<<<<' "$APP_DIR"/*.swift
            exit 1
          fi

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: |
            derived-data-${{ runner.os }}-${{ hashFiles('MusicManager.xcodeproj/project.pbxproj', 'MusicManager/**/*.swift') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      - name: Build unsigned IPA
        id: build
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          rm -rf "$DERIVED_DATA"
          mkdir -p "$DERIVED_DATA"

          echo "=== Starting xcodebuild ==="
          echo "Configuration: $CONFIGURATION"
          echo "SDK: iphoneos"
          echo "DerivedData: $DERIVED_DATA"

          # Build with filtered output for readability
          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            -allowProvisioningUpdates \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | \
            grep -v '^[[:space:]]*$' | \
            grep -E '(error:|warning:|BUILD|===|CompileSwift|Ld |CpResource|Generate|Write)' || true

          BUILD_RESULT=${PIPESTATUS[0]}

          if [[ $BUILD_RESULT -ne 0 ]]; then
            echo ""
            echo "=== BUILD FAILED (exit $BUILD_RESULT) ==="
            echo "--- Last 100 lines of build log ---"
            tail -n 100 "$RUNNER_TEMP/xcodebuild.log"
            exit 1
          fi

          echo "=== BUILD SUCCEEDED ==="

      - name: Locate app bundle
        id: locate-app
        shell: bash
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          APP_PATH="$(find "$DERIVED_DATA" -name '*.app' -type d | head -n 1)"

          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: No .app bundle found in DerivedData"
            find "$DERIVED_DATA" -type d | head -30
            exit 1
          fi

          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Package IPA
        id: package
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="${{ steps.locate-app.outputs.app-path }}"
          ARTIFACT_PATH="$GITHUB_WORKSPACE/ci-artifacts"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"

          mkdir -p "$ARTIFACT_PATH"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"

          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          APP_NAME="$(basename "$APP_PATH")"

          # Strip code signing
          rm -rf "$PAYLOAD_DIR/$APP_NAME/_CodeSignature" 2>/dev/null || true
          rm -f "$PAYLOAD_DIR/$APP_NAME/embedded.mobileprovision" 2>/dev/null || true

          # Log binary architectures
          BINARY_PATH="$PAYLOAD_DIR/$APP_NAME/$SCHEME"
          if [[ -f "$BINARY_PATH" ]]; then
            echo "Binary architectures:"
            lipo -info "$BINARY_PATH" || true
          fi

          # Create IPA
          IPA_PATH="$ARTIFACT_PATH/ByeTunes-unsigned.ipa"
          ditto -c -k --sequesterRsrc --keepParent "$PAYLOAD_DIR" "$IPA_PATH"

          IPA_SIZE="$(du -sh "$IPA_PATH" | cut -f1)"
          echo "ipa-size=$IPA_SIZE" >> "$GITHUB_OUTPUT"
          echo "IPA created: $IPA_SIZE"
          ls -lh "$IPA_PATH"

          # Save build log alongside artifact
          cp "$RUNNER_TEMP/xcodebuild.log" "$ARTIFACT_PATH/"

      - name: Upload artifacts
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ByeTunes-unsigned-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ci-artifacts/ByeTunes-unsigned.ipa
            ci-artifacts/xcodebuild.log
          if-no-files-found: warn
          retention-days: 14

      - name: Build summary
        if: always()
        shell: bash
        run: |
          IPA_SIZE="${{ steps.package.outputs.ipa-size }}"

          echo "## ByeTunes Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode selection | ${{ steps.setup-xcode.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rust toolchain | ${{ steps.rust-toolchain.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build idevice-ffi | ${{ steps.build-idevice.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify project | ${{ steps.verify-project.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package IPA | ${{ steps.package.outcome == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$IPA_SIZE" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 📦 Artifact" >> "$GITHUB_STEP_SUMMARY"
            echo "- **IPA Size**: $IPA_SIZE" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Download**: \`ByeTunes-unsigned-${{ github.run_id }}-${{ github.run_attempt }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.build.outcome }}" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ⚠️ Build failed — see logs for details" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Attach IPA to release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: ci-artifacts/ByeTunes-unsigned.ipa
          fail_on_unmatched_files: false

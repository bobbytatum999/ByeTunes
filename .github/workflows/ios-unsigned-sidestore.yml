name: Build unsigned ByeTunes IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: unsigned-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    name: Build unsigned device IPA
    runs-on: macos-latest

    permissions:
      contents: write

    env:
      PROJECT_FILE: MusicManager.xcodeproj
      SCHEME: MusicManager
      APP_DIR: MusicManager
      CONFIGURATION: Release
      DERIVED_DATA: ${{ runner.temp }}/DerivedData
      PAYLOAD_DIR: ${{ runner.temp }}/Payload
      ARTIFACT_DIR: ${{ runner.temp }}/artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest available Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show selected Xcode
        run: |
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install Rust with iOS target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: byetunes-idevice-ffi

      - name: Build idevice-ffi and stage required files
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth 1 https://github.com/jkcoxson/idevice "$RUNNER_TEMP/idevice"
          pushd "$RUNNER_TEMP/idevice"

          export IPHONEOS_DEPLOYMENT_TARGET=16.0
          cargo build --release --package idevice-ffi --target aarch64-apple-ios

          HEADER_PATH="$(find . -type f -name 'idevice.h' | head -n 1)"
          LIB_PATH="$(find target -type f -path '*aarch64-apple-ios/release/libidevice_ffi.a' | head -n 1)"

          test -n "$HEADER_PATH"
          test -n "$LIB_PATH"

          cp "$HEADER_PATH" "$GITHUB_WORKSPACE/$APP_DIR/idevice.h"
          cp "$LIB_PATH" "$GITHUB_WORKSPACE/$APP_DIR/libidevice_ffi.a"

          popd

          cat > "$GITHUB_WORKSPACE/$APP_DIR/Bridging-Header.h" <<'EOF'
          #import "idevice.h"
          EOF

          ls -la "$GITHUB_WORKSPACE/$APP_DIR"

      - name: Verify project and scheme
        shell: bash
        run: |
          set -euxo pipefail
          xcodebuild -list -project "$PROJECT_FILE"

      - name: Build unsigned app for real iOS devices
        shell: bash
        run: |
          set -euxo pipefail

          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=\"\" \
            DEVELOPMENT_TEAM=\"\" \
            | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: Package unsigned IPA for SideStore and AltStore
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION-iphoneos/$SCHEME.app"

          test -d "$APP_PATH"

          mkdir -p "$PAYLOAD_DIR" "$ARTIFACT_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          rm -rf "$PAYLOAD_DIR/$SCHEME.app/_CodeSignature" || true
          rm -f "$PAYLOAD_DIR/$SCHEME.app/embedded.mobileprovision" || true

          if [ -d "$DERIVED_DATA/Build/Products/$CONFIGURATION-iphoneos/$SCHEME.app.dSYM" ]; then
            cp -R "$DERIVED_DATA/Build/Products/$CONFIGURATION-iphoneos/$SCHEME.app.dSYM" "$ARTIFACT_DIR/"
          fi

          ditto -c -k --sequesterRsrc --keepParent "$PAYLOAD_DIR" "$ARTIFACT_DIR/ByeTunes-unsigned.ipa"
          cp -R "$APP_PATH" "$ARTIFACT_DIR/"

          ls -la "$ARTIFACT_DIR"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ByeTunes-unsigned-iphoneos
          path: |
            ${{ runner.temp }}/artifacts/ByeTunes-unsigned.ipa
            ${{ runner.temp }}/artifacts/MusicManager.app
            ${{ runner.temp }}/artifacts/MusicManager.app.dSYM
            ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: error

      - name: Attach unsigned IPA to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/artifacts/ByeTunes-unsigned.ipa
